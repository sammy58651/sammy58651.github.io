---
layout: default
---
<article>
  <h1 style="color: #222; margin-bottom: 5px;">{{ page.title }}</h1>
  
  <time style="color: #88px; font-size: 0.9em;">發表於：{{ page.date | date: "%Y-%m-%d" }}</time>
  
  <hr style="border: 0; border-top: 1px dashed #ccc; margin: 20px 0;">

  <div class="entry-content">
    {{ content }}
  </div>
</article>
